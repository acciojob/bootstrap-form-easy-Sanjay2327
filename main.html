<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="container mt-4 ">
		<h1 class="text-center mb-4">Internship Form</h1>
		
		<form class="row g-3">
			<div class="col-md-4">
			<label for="first-name-input" class="form-label">First Name</label>
		    <input type="text" id="first-name-input" class="form-control" required="yes" />
		</div>
		<div class="col-md-4">
			<label for="last-name-input" class="form-label">Last Name</label>
			<input type="text" id="last-name-input" class="form-control" required="yes" />
		</div>
		<div class="col-md-4">
			<label for="email-input" class="form-label">Email Address</label>
 		    <input type="email" id="email-input" class="form-control" required="yes"/>
		</div>
		<div class="col-md-6">
			<label for="college-input" class="form-label">College</label>
		    <input type="text" id="college-input" class="form-control" required="yes"/>
		</div>
		<div class="col-md-3">
			<label for="grad-year-select" class="form-label">Graduation Year</label>
		    <select class="form-select" id="grad-year-select" required="yes">
                <option value="">Choose...</option>
                <option>2020</option>
                <option>2021</option>
                <option>2022</option>
                <option>2023</option>
            </select>
		</div>
		<div class="col-md-3">
			<label for="roll-no-input" class="form-label">Roll No.</label>
			<input type="text" id="roll-no-input" class="form-control"required="yes"/>
		</div>
		<div class="col-12">
			<label for="conditions-checkbox">Agree to terms and Conditions</label>
			<input type="checkbox" id="conditions-checkbox" class="form-check-input" required="yes"/>
		</div>
		<div class=" col-12">
			<button class="btn btn-primary">Submit form</button>
		</div>
		</form>		
	</div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
